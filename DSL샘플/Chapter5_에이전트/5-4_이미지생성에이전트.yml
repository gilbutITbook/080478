    #Step1

    사용자가 입력한 텍스트를 GoogleSearch로 검색한다.

     

    #Step2

    검색 후, 상위에 표시된 기사를 참고하여 이미지 생성 콘셉트를 2가지 구상하고 사용자에게 알려준다.

     

    #Step3

    Step2에서 구상한 콘셉트를 바탕으로 다음과 같이 이미지를 생성한다.

    - dalle3로 2장

    - stability_txt2image로 2장'

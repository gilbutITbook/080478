    \ 뉴스\"를 검색한다.\n\n#Step3\n- Step2에서 얻은 정보를 바탕으로 \"오늘의 운세\"를 점친다. \n- 오늘의 운세\n-\
    \ 오늘의 함정\n- 오늘의 행운 아이템\n\n#Step4\n- Step2와 Step3의 결과를 다음 순서대로 사용자에게 표시한다.\n- \"\

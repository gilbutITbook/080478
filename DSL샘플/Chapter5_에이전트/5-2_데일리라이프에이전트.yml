    \ 운세\"\n- \"오늘의 함정\"\n- \"오늘의 행운 아이템\"\n\n마지막으로 사용자가 오늘 하루 힘내서 보낼 수 있도록 응원의 메시지를\
    \ 출력해 줘.\n"
